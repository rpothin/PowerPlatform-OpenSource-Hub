site_name: Power Platform Open-Source Hub
site_description: >-
  A central intelligence hub for the Power Platform and Copilot Studio
  open-source ecosystem. Discover repositories, learn best practices,
  and find your next contribution.
site_url: https://rpothin.github.io/PowerPlatform-OpenSource-Hub/
repo_url: https://github.com/rpothin/PowerPlatform-OpenSource-Hub
repo_name: rpothin/PowerPlatform-OpenSource-Hub
edit_uri: edit/main/docs/

copyright: >-
  Copyright &copy; 2024-2026 Power Platform Open-Source Hub Contributors

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.png
  logo: assets/logo-green.png
  font:
    text: Segoe UI
    code: Cascadia Code
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green
      toggle:
        icon: custom/copilot-studio
        name: Switch to Copilot Studio theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: cyan
      toggle:
        icon: custom/power-platform
        name: Switch to Power Platform theme
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rpothin/PowerPlatform-OpenSource-Hub
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Registry:
    - registry/index.md
    - Power Apps: registry/power-apps.md
    - Power Automate: registry/power-automate.md
    - Dataverse: registry/dataverse.md
    - Copilot Studio: registry/copilot-studio.md
    - PCF Controls: registry/pcf-controls.md
    - Dynamics 365: registry/dynamics-365.md
  - Guide:
    - guide/index.md
    - Contributing: guide/contributing.md
    - Naming Conventions: guide/naming-conventions.md
    - Repository Onboarding: guide/repository-onboarding.md
