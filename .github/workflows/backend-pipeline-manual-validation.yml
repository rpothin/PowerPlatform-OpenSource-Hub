name: backend-pipeline-manual-validation
# Manual-only validation workflow for the TypeScript backend pipeline (live or dry-run, with optional parity comparison).

on:
  workflow_dispatch:
    inputs:
      typescript_mode:
        description: 'TypeScript candidate generation mode.'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - live
          - skip
      baseline_path:
        description: 'Repository-relative baseline JSON for parity comparison.'
        required: true
        default: Data/GitHubRepositoriesDetails.json
        type: string
      compare_with_baseline:
        description: 'Compare generated candidate outputs with the selected baseline.'
        required: true
        default: true
        type: boolean
      fail_on_parity_failure:
        description: 'Fail this shadow run when a requested parity comparison fails.'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  shadow-validation:
    runs-on: ubuntu-latest
    env:
      BASELINE_PATH: ${{ inputs.baseline_path }}
      COMPARE_WITH_BASELINE: ${{ inputs.compare_with_baseline }}
      FAIL_ON_PARITY_FAILURE: ${{ inputs.fail_on_parity_failure }}
      TYPESCRIPT_MODE: ${{ inputs.typescript_mode }}
      GENERATED_SCHEMA_PATH: ../Configuration/Schemas/GitHubRepositoryGenerated.schema.json
      MERGED_SCHEMA_PATH: ../Configuration/Schemas/GitHubRepositoriesDetails.schema.json
      SENTINELS_PATH: ../Configuration/SentinelRepositories.json
      TAXONOMY_DIR: ../Configuration/Taxonomy

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate shadow-run inputs
        run: |
          set -euo pipefail
          normalized_baseline="${BASELINE_PATH//\\//}"
          if [[ "$normalized_baseline" == /* || "$normalized_baseline" == *".."* ]]; then
            echo "::error::baseline_path must stay within the checked-out repository."
            exit 1
          fi
          echo "BASELINE_PATH=$normalized_baseline" >> "$GITHUB_ENV"
          BASELINE_PATH="$normalized_baseline"

          {
            echo "### Backend pipeline shadow validation"
            echo ""
            echo "| Setting | Value |"
            echo "| --- | --- |"
            echo "| TypeScript mode | \`$TYPESCRIPT_MODE\` |"
            echo "| Baseline | \`$BASELINE_PATH\` |"
            echo "| Compare with baseline | \`$COMPARE_WITH_BASELINE\` |"
            echo "| Fail on parity failure | \`$FAIL_ON_PARITY_FAILURE\` |"
            echo ""
            echo "This workflow uploads shadow outputs and reports only; it does not commit generated data."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        if: ${{ inputs.typescript_mode != 'skip' || inputs.compare_with_baseline }}
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Pipeline/package-lock.json

      - name: Install TypeScript candidate dependencies
        if: ${{ inputs.typescript_mode != 'skip' || inputs.compare_with_baseline }}
        working-directory: Pipeline
        run: npm ci

      - name: Build TypeScript candidate CLI
        if: ${{ inputs.typescript_mode != 'skip' || inputs.compare_with_baseline }}
        working-directory: Pipeline
        run: npm run build

      - name: Run TypeScript candidate shadow generation
        if: ${{ inputs.typescript_mode != 'skip' }}
        working-directory: Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_ACCESS_PUBLIC_GITHUB_REPOSITORIES || github.token }}
        run: |
          set -euo pipefail
          mkdir -p Output/shadow/GeneratedRepositories Output/shadow/CuratedRepositories

          generated_dir="./Output/shadow/GeneratedRepositories"
          generated_output="./Output/shadow/typescript-generated-layer.json"
          merged_output="./Output/shadow/typescript-merged-repositories.json"
          metrics_output="./Output/shadow/typescript-metrics.json"
          merge_summary="./Output/shadow/typescript-merge-summary.json"
          overlay_dir="./Output/shadow/CuratedRepositories"

          if [[ "$TYPESCRIPT_MODE" == "live" ]]; then
            echo "TypeScript live mode was explicitly requested for this manual shadow run."
            overlay_dir="../Data/CuratedRepositories"
            node dist/cli.js generate \
              --live \
              --output "$generated_output" \
              --generated-dir "$generated_dir" \
              --generated-schema "$GENERATED_SCHEMA_PATH" \
              --metrics "$metrics_output"
          else
            node dist/cli.js generate \
              --dry-run \
              --output "$generated_output" \
              --generated-dir "$generated_dir" \
              --generated-schema "$GENERATED_SCHEMA_PATH" \
              --metrics "$metrics_output"
          fi

          node dist/cli.js merge \
            --generated-dir "$generated_dir" \
            --overlay-dir "$overlay_dir" \
            --schema "$MERGED_SCHEMA_PATH" \
            --output "$merged_output" \
            --taxonomy-dir "$TAXONOMY_DIR" \
            --sentinels "$SENTINELS_PATH" \
            --generated-schema "$GENERATED_SCHEMA_PATH" > "$merge_summary"

          CANDIDATE_NAME=TypeScript \
          CANDIDATE_MODE="$TYPESCRIPT_MODE" \
          GENERATED_DIR="$generated_dir" \
          GENERATED_OUTPUT_PATH="$generated_output" \
          MERGED_OUTPUT_PATH="$merged_output" \
          METRICS_PATH="$metrics_output" \
          MERGE_SUMMARY_PATH="$merge_summary" \
          OVERLAY_DIR="$overlay_dir" \
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const metrics = JSON.parse(fs.readFileSync(process.env.METRICS_PATH, 'utf8'));
          const mergeMetrics = JSON.parse(fs.readFileSync(process.env.MERGE_SUMMARY_PATH, 'utf8'));
          const lines = [
            `### ${process.env.CANDIDATE_NAME} shadow generation`,
            '',
            '| Metric | Value |',
            '| --- | ---: |',
            `| Mode | \`${process.env.CANDIDATE_MODE}\` |`,
            `| Generated records | ${metrics.generatedRecords ?? metrics.recordsWritten ?? 'n/a'} |`,
            `| Detail failures | ${metrics.detailFailures ?? 'n/a'} |`,
            `| Matched overlays | ${mergeMetrics.matchedOverlays ?? 'n/a'} |`,
            `| Excluded repositories | ${mergeMetrics.excludedRepositories ?? 'n/a'} |`,
            `| Warnings | ${(metrics.warnings ?? metrics.observations ?? []).length} |`,
            `| Metrics artifact | \`${process.env.METRICS_PATH}\` |`,
            `| Generated directory | \`${process.env.GENERATED_DIR}\` |`,
            `| Generated layer artifact | \`${process.env.GENERATED_OUTPUT_PATH}\` |`,
            `| Overlay source | \`${process.env.OVERLAY_DIR}\` |`,
            `| Merged output artifact | \`${process.env.MERGED_OUTPUT_PATH}\` |`,
            `| Merge summary artifact | \`${process.env.MERGE_SUMMARY_PATH}\` |`,
            ''
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Compare shadow outputs with baseline
        if: ${{ inputs.compare_with_baseline }}
        working-directory: Pipeline
        run: |
          set -euo pipefail
          mkdir -p Output/shadow

          baseline="../$BASELINE_PATH"
          if [[ ! -f "$baseline" ]]; then
            {
              echo "### Output parity comparison"
              echo ""
              echo "Skipped because baseline \`$BASELINE_PATH\` was not found."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          comparison_status=0

          compare_candidate() {
            local label="$1"
            local candidate="$2"
            local report="$3"
            local summary="${report%.json}.summary.md"

            if [[ ! -f "$candidate" ]]; then
              {
                echo "### ${label} output parity comparison"
                echo ""
                echo "Skipped because candidate output \`$candidate\` was not generated."
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
              return
            fi

            set +e
            node dist/cli.js compare --baseline "$baseline" --candidate "$candidate" --sentinels ../Configuration/SentinelRepositories.json --report "$report" > "$summary" 2>&1
            local exit_code=$?
            set -e

            {
              echo "### ${label} output parity comparison"
              echo ""
              echo "| Setting | Value |"
              echo "| --- | --- |"
              echo "| Baseline | \`$BASELINE_PATH\` |"
              echo "| Candidate | \`$candidate\` |"
              echo "| Report | \`$report\` |"
              echo "| Exit code | \`$exit_code\` |"
              echo ""
              cat "$summary"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            if [[ "$exit_code" -ne 0 ]]; then
              comparison_status=1
            fi
          }

          compare_candidate "TypeScript generated layer" ./Output/shadow/typescript-generated-layer.json ./Output/shadow/typescript-generated-parity-report.json
          compare_candidate "TypeScript merged artifact" ./Output/shadow/typescript-merged-repositories.json ./Output/shadow/typescript-merged-parity-report.json

          if [[ "$comparison_status" -ne 0 && "$FAIL_ON_PARITY_FAILURE" == "true" ]]; then
            exit 1
          fi

      - name: Upload shadow validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-pipeline-manual-validation-${{ github.run_id }}
          path: |
            Pipeline/Output/shadow/
          if-no-files-found: warn
