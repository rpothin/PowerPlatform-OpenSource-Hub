# Placeholder workflow for updating the repositories.json data file.
# This workflow conceptually runs a script to refresh the local database
# using the GitHub GraphQL API.
#
# In production, this would:
# 1. Query the GitHub GraphQL API for Power Platform repositories
# 2. Process and enrich the data
# 3. Write the results to Website/src/data/repositories.json
# 4. Commit and push the updated data

name: Update Repository Data

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch repository data (placeholder)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Power Platform OSS Hub — Data Update ==="
          echo ""
          echo "This is a placeholder step. In production, this would:"
          echo "  1. Read search criteria from Configuration/GitHubRepositoriesSearchCriteria.json"
          echo "  2. Query the GitHub GraphQL API for repositories matching each topic"
          echo "  3. Collect metadata: stars, forks, issues, languages, releases"
          echo "  4. Calculate popularity scores"
          echo "  5. Write the enriched data to Website/src/data/repositories.json"
          echo ""
          echo "Example GraphQL query:"
          echo '  query($searchQuery: String!, $first: Int!) {'
          echo '    search(query: $searchQuery, type: REPOSITORY, first: $first) {'
          echo '      nodes { ... on Repository { name stargazerCount forkCount } }'
          echo '    }'
          echo '  }'
          echo ""
          echo "Skipping actual API call in placeholder mode."

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet Website/src/data/repositories.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Website/src/data/repositories.json
          git commit -m "chore: update repository data [automated]"
          git push
