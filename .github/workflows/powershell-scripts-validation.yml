name: powershell-scripts-validation
# Validate the changes to PowerShell scripts

# Workflow triggered by a change under the PowerShell pipeline surfaces - but can also be triggered manually
on:
  push:
    branches: [ main ]
    paths:
      - 'Scripts/**'
      - 'Configuration/**'
      - 'Data/GitHubRepositoriesDetails.json'
      - '.github/workflows/powershell-scripts-validation.yml'
      - '.github/workflows/update-github-repositories-details.yml'
  pull_request:
    paths:
      - 'Scripts/**'
      - 'Configuration/**'
      - 'Data/GitHubRepositoriesDetails.json'
      - '.github/workflows/powershell-scripts-validation.yml'
      - '.github/workflows/update-github-repositories-details.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

# Concurrency configuration for the current workflow - Keep only the latest workflow queued for the considered group and the considered issue
concurrency:
  group: powershell-scripts-validation-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      # Action used to checkout the main branch in the current repository
      #   Community action: https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository details data
        run: |
          $schemaFilePath = ".\Configuration\Schemas\GitHubRepositoriesDetails.schema.json"
          $dataFilePath = ".\Data\GitHubRepositoriesDetails.json"

          if (-not (Test-Path -Path $schemaFilePath)) {
            throw "No schema file found at the path '$schemaFilePath'."
          }

          if (-not (Test-Path -Path $dataFilePath)) {
            throw "No repository details data file found at the path '$dataFilePath'."
          }

          $dataAsJson = Get-Content -Path $dataFilePath -Raw
          if (-not ($dataAsJson | Test-Json -SchemaFile $schemaFilePath)) {
            throw "The committed repository details data does not match the schema file '$schemaFilePath'."
          }

          $repositories = @($dataAsJson | ConvertFrom-Json)
          $schemaVersions = ($repositories | ForEach-Object { $_._schemaVersion } | Sort-Object -Unique) -join ", "
          if ([string]::IsNullOrWhiteSpace($schemaVersions)) {
            $schemaVersions = "none"
          }

          Write-Host "Repository details count: $($repositories.Count)"
          Write-Host "Repository details schema versions: $schemaVersions"

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              "### Repository details baseline"
              ""
              "| Metric | Value |"
              "| --- | ---: |"
              "| Repository count | $($repositories.Count) |"
              "| Schema versions | $schemaVersions |"
            ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
        shell: pwsh

      # Run tests on all *.Tests.ps1 files
      - name: Run Pester tests
        run: |
          $pesterCommand = Get-Command Invoke-Pester -ErrorAction SilentlyContinue
          if (-not $pesterCommand) {
            throw "Invoke-Pester is not available."
          }

          $pesterModule = Get-Module -Name Pester -ListAvailable | Sort-Object -Property Version -Descending | Select-Object -First 1
          if ($pesterModule -and $pesterModule.Version.Major -ge 5) {
            Invoke-Pester -CI
          } else {
            Invoke-Pester -EnableExit
          }
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_ACCESS_PUBLIC_GITHUB_REPOSITORIES }}

  PSScriptAnalyzer:
    runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      # Action used to checkout the main branch in the current repository
      #   Community action: https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v6

      # Run PSScriptAnalyzer on all *.ps1 files
      # Note: microsoft/psscriptanalyzer-action@v1.1 requires ConvertToSARIF which is no longer
      # available on PSGallery, so we run PSScriptAnalyzer directly with inline SARIF generation.
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $analyzerModule = Get-Module -ListAvailable -Name PSScriptAnalyzer
          if ($null -eq $analyzerModule) {
            Install-Module -Name PSScriptAnalyzer -Force
          }

          $results = @(Invoke-ScriptAnalyzer -Path .\ -Recurse)

          $sarifResults = $results | ForEach-Object {
            @{
              ruleId    = $_.RuleName
              level     = switch ($_.Severity) {
                'Error'       { 'error' }
                'Warning'     { 'warning' }
                'Information' { 'note' }
                default       { 'warning' }
              }
              message   = @{ text = $_.Message }
              locations = @(
                @{
                  physicalLocation = @{
                    artifactLocation = @{
                      uri       = ($_.ScriptPath -replace '\\', '/' -replace '^\./', '')
                      uriBaseId = '%SRCROOT%'
                    }
                    region           = @{
                      startLine   = $_.Line
                      startColumn = $_.Column
                    }
                  }
                }
              )
            }
          }

          $sarif = [ordered]@{
            '$schema' = 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json'
            version   = '2.1.0'
            runs      = @(
              [ordered]@{
                tool    = @{
                  driver = @{
                    name           = 'PSScriptAnalyzer'
                    informationUri = 'https://github.com/PowerShell/PSScriptAnalyzer'
                    rules          = @()
                  }
                }
                results = @($sarifResults)
              }
            )
          }

          $sarif | ConvertTo-Json -Depth 20 | Set-Content -Path results.sarif -Encoding UTF8

          if ($results.Count -gt 0) {
            Write-Host "PSScriptAnalyzer produced $($results.Count) result(s)."
            $results | Format-Table -AutoSize
          } else {
            Write-Host "PSScriptAnalyzer found no issues."
          }

      # Upload the results of the PSScriptAnalyzerResults execution
      #   Action: https://github.com/actions/upload-artifact
      - name: Upload PSScriptAnalyzer Results
        uses: actions/upload-artifact@v7
        with:
          name: PSScriptAnalyzerResults
          path: results.sarif
      
      # Upload the SARIF file generated in the previous step
      #   Community action: https://github.com/github/codeql-action
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
